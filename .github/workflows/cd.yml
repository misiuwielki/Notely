name: cd

on:
    push:
        branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
        - name: Check out the code
          uses: actions/checkout@v6

        - name: Set up Go
          uses: actions/setup-go@v6
          with:
            go-version: "1.26.0"

        - name: Build app
          run: ./scripts/buildprod.sh

        - name: Install and verify goose 
          run: |
            go install github.com/pressly/goose/v3/cmd/goose@latest
            goose -version

        - name: Run DB migrations
          run: ./scripts/migrateup.sh

        - name: Authorise Google Cloud
          uses: google-github-actions/auth@v2
          with:
            credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          
        - name: Set up Cloud SDK
          uses: google-github-actions/setup-gcloud@v3
          with:
            project_id: notely-499615
        
        - name: Confirm that gcloud works
          run: gcloud info

        - name: Build and Push Container
          run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-499615/notely-ar-repo/notely:latest .

        - name: Deploy to Cloud Run
          run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-499615/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --max-instances=4